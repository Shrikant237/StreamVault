{% extends "base.html" %}
{% block title %}Watch — StreamVault{% endblock %}

{% block head %}
<style>
.watch-layout{display:grid;grid-template-columns:1fr 340px;gap:1.5rem;max-width:1300px}
.player-box{background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9}
video{width:100%;height:100%;display:block}
.v-title{font-size:1.2rem;font-weight:600;margin:1rem 0 .5rem;line-height:1.4}
.v-bar{display:flex;align-items:center;justify-content:space-between;
       padding:.65rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:.9rem}
.v-bar .left{color:var(--muted);font-size:.85rem}
.like-bar{display:flex;align-items:center;gap:.5rem;margin:.75rem 0}
.btn-like,.btn-dislike{display:flex;align-items:center;gap:.4rem;padding:.45rem 1rem;
  border-radius:20px;border:1px solid var(--border);background:var(--s2);
  color:var(--text);font-size:.875rem;cursor:pointer;font-family:inherit;transition:.15s;font-weight:500}
.btn-like:hover{border-color:#5a6e3a;background:rgba(90,110,58,.1);color:#5a6e3a}
.btn-dislike:hover{border-color:#b03a2e;background:rgba(176,58,46,.1);color:#b03a2e}
.btn-like.active{background:#5a6e3a;color:#fff;border-color:#5a6e3a}
.btn-dislike.active{background:#b03a2e;color:#fff;border-color:#b03a2e}
.btn-like:disabled,.btn-dislike:disabled{opacity:.5;cursor:not-allowed}
.ch-row{display:flex;align-items:center;gap:.75rem;margin:.9rem 0;padding:.9rem;
        background:var(--s2);border-radius:12px}
.ch-row .av{width:44px;height:44px;border-radius:50%;background:var(--accent);flex-shrink:0;
            display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:#fff}
.ch-row .info{flex:1}
.ch-row .info a{font-weight:600;color:var(--text);text-decoration:none;font-size:.95rem}
.ch-row .info a:hover{text-decoration:underline}
.ch-row .info .sub-txt{font-size:.78rem;color:var(--muted);margin-top:.1rem}
.btn-subscribe{padding:.5rem 1.2rem;border-radius:20px;border:1px solid transparent;
               font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;flex-shrink:0}
.btn-subscribe.unsub{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-subscribe.unsub:hover{background:var(--accent-h)}
.btn-subscribe.sub{background:var(--surface);border-color:var(--border);color:var(--text)}
.btn-subscribe.sub:hover{background:#fdf0f0;border-color:#f5c6c0;color:#b03a2e}
.btn-subscribe:disabled{opacity:.6;cursor:not-allowed}
.v-desc{background:var(--s2);border-radius:10px;padding:.9rem 1rem;font-size:.875rem;
        line-height:1.6;color:var(--muted);white-space:pre-wrap;cursor:pointer;
        max-height:80px;overflow:hidden;transition:max-height .3s}
.v-desc.open{max-height:600px}
.btn-del{padding:.35rem .9rem;background:#fdf0f0;border:1px solid #f5c6c0;
         border-radius:20px;color:#b03a2e;font-size:.78rem;cursor:pointer;font-family:inherit}
.btn-del:hover{background:#f5c6c0}
.side-title{font-size:.95rem;font-weight:600;margin-bottom:.9rem}
.mini{display:flex;gap:.65rem;text-decoration:none;color:inherit;margin-bottom:.9rem}
.mini-thumb{width:110px;flex-shrink:0;border-radius:8px;overflow:hidden;aspect-ratio:16/9;background:var(--s2)}
.mini-thumb img{width:100%;height:100%;object-fit:cover}
.mini-nothumb{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted2)}
.mini-meta h4{font-size:.82rem;font-weight:500;line-height:1.3;
              display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mini-meta .mc{font-size:.75rem;color:var(--muted);margin-top:.15rem}
@media(max-width:900px){.watch-layout{grid-template-columns:1fr}}
</style>
{% endblock %}

{% block content %}
<div class="watch-layout">
  <div>
    <div class="player-box" id="player-box">
      <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)">Loading...</div>
    </div>
    <div id="v-details"></div>
  </div>
  <div>
    <p class="side-title">More Videos</p>
    <div id="more-videos"><div style="color:var(--muted);font-size:.85rem">Loading...</div></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const videoId = location.pathname.split('/').pop();
let watchUname = '';

async function loadVideo(){
  try{
    const headers = {};
    if(getToken()) headers['Authorization'] = 'Bearer ' + getToken();
    const r = await fetch(`/api/videos/${videoId}`, { headers });
    if(!r.ok){
      document.getElementById('player-box').innerHTML =
        '<div style="text-align:center;padding:3rem;color:var(--muted)">Video not found.</div>';
      return;
    }
    const {video:v} = await r.json();
    document.title = v.title + ' — StreamVault';
    watchUname = v.uploader ? v.uploader.username : '';

    document.getElementById('player-box').innerHTML =
      `<video controls autoplay preload="metadata">
         <source src="/stream/${v.id}" type="video/mp4">
         Your browser does not support video.
       </video>`;

    const isOwner = currentUser && currentUser.id === v.user_id;

    // fetch subscription status
    let isSubscribed = false;
    let subCount     = 0;
    if(watchUname){
      try{
        const sc = await fetch(`/api/channel/${watchUname}`, {headers});
        if(sc.ok){
          const sd   = await sc.json();
          isSubscribed = sd.user.is_subscribed || false;
          subCount     = sd.user.subscriber_count || 0;
        }
      }catch(e){}
    }

    const subBtnHtml = (!isOwner && watchUname)
      ? `<button class="btn-subscribe ${isSubscribed?'sub':'unsub'}"
                 id="btn-sub-watch"
                 onclick="toggleSubWatch()">
           ${isSubscribed ? '✓ Subscribed' : '+ Subscribe'}
         </button>`
      : '';

    function fmtSubs(n){
      if(!n) return '0 subscribers';
      if(n>=1e6) return (n/1e6).toFixed(1)+'M subscribers';
      if(n>=1e3) return (n/1e3).toFixed(1)+'K subscribers';
      return n+(n===1?' subscriber':' subscribers');
    }

    document.getElementById('v-details').innerHTML = `
      <h1 class="v-title">${v.title}</h1>
      <div class="v-bar">
        <span class="left">${fmtViews(v.views)} &nbsp;·&nbsp; ${timeAgo(v.created_at)}</span>
        ${isOwner ? `<button class="btn-del" onclick="delVideo('${v.id}')">🗑 Delete</button>` : ''}
      </div>

      <div class="like-bar">
        <button class="btn-like ${v.user_reaction==='like'?'active':''}"
                id="btn-like" onclick="reactVideo(true)"
                ${!getToken()?'title="Sign in to like"':''}>
          👍 <span id="like-count">${v.likes||0}</span>
        </button>
        <button class="btn-dislike ${v.user_reaction==='dislike'?'active':''}"
                id="btn-dislike" onclick="reactVideo(false)"
                ${!getToken()?'title="Sign in to dislike"':''}>
          👎 <span id="dislike-count">${v.dislikes||0}</span>
        </button>
      </div>

      <div class="ch-row">
        <div class="av">${watchUname ? watchUname[0].toUpperCase() : '?'}</div>
        <div class="info">
          <a href="/channel/${watchUname}">${watchUname}</a>
          <div class="sub-txt" id="watch-sub-count">${fmtSubs(subCount)}</div>
        </div>
        ${subBtnHtml}
      </div>

      ${v.description
        ? `<div class="v-desc" id="vdesc" onclick="this.classList.toggle('open')">${v.description}
           <br/><small style="color:var(--accent)">Show more</small></div>`
        : ''}`;

  }catch(e){ console.error(e); }
}

async function loadMore(){
  try{
    const r = await fetch('/api/videos?limit=10');
    const d = await r.json();
    document.getElementById('more-videos').innerHTML =
      d.videos.filter(v => v.id !== videoId).map(v => {
        const t  = v.thumbnail
          ? `<img src="${v.thumbnail}" loading="lazy"/>`
          : `<div class="mini-nothumb">▶</div>`;
        const un = v.uploader ? v.uploader.username : '?';
        return `<a href="/watch/${v.id}" class="mini">
          <div class="mini-thumb">${t}</div>
          <div class="mini-meta">
            <h4>${v.title}</h4>
            <div class="mc">${un}<br/>${fmtViews(v.views)} · ${timeAgo(v.created_at)}</div>
          </div>
        </a>`;
      }).join('') || '<div style="color:var(--muted);font-size:.85rem">No other videos.</div>';
  }catch(e){}
}

async function delVideo(id){
  if(!confirm('Delete this video permanently?')) return;
  const r = await fetch(`/api/videos/${id}`, {
    method: 'DELETE',
    headers: {'Authorization': 'Bearer ' + getToken()}
  });
  if(r.ok) window.location.href = '/home';
  else alert('Failed to delete.');
}

async function reactVideo(isLike){
  if(!getToken()){ alert('Please sign in to like or dislike videos.'); return; }
  const btnL = document.getElementById('btn-like');
  const btnD = document.getElementById('btn-dislike');
  if(btnL) btnL.disabled = true;
  if(btnD) btnD.disabled = true;
  try{
    const r = await fetch(`/api/videos/${videoId}/like`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+getToken()},
      body: JSON.stringify({is_like: isLike})
    });
    const d = await r.json();
    if(r.ok){
      document.getElementById('like-count').textContent    = d.likes;
      document.getElementById('dislike-count').textContent = d.dislikes;
      if(btnL) btnL.classList.toggle('active', d.user_reaction==='like');
      if(btnD) btnD.classList.toggle('active', d.user_reaction==='dislike');
    }
  }catch(e){ console.error(e); }
  if(btnL) btnL.disabled = false;
  if(btnD) btnD.disabled = false;
}

async function toggleSubWatch(){
  if(!getToken()){ alert('Please sign in to subscribe.'); return; }
  const btn = document.getElementById('btn-sub-watch');
  if(btn) btn.disabled = true;
  try{
    const r = await fetch(`/api/channel/${watchUname}/subscribe`, {
      method: 'POST',
      headers: {'Authorization': 'Bearer ' + getToken()}
    });
    const d = await r.json();
    if(r.ok){
      if(btn){
        btn.textContent = d.subscribed ? '✓ Subscribed' : '+ Subscribe';
        btn.className   = 'btn-subscribe ' + (d.subscribed ? 'sub' : 'unsub');
      }
      function fmtSubs(n){
        if(!n) return '0 subscribers';
        if(n>=1e6) return (n/1e6).toFixed(1)+'M subscribers';
        if(n>=1e3) return (n/1e3).toFixed(1)+'K subscribers';
        return n+(n===1?' subscriber':' subscribers');
      }
      const sc = document.getElementById('watch-sub-count');
      if(sc) sc.textContent = fmtSubs(d.subscriber_count);
    } else {
      alert(d.error || 'Something went wrong.');
    }
  }catch(e){ console.error(e); }
  if(btn) btn.disabled = false;
}

loadVideo();
loadMore();
</script>
{% endblock %}
